works:
- title: "Water Wars"
  coauthors: "[Andrea Marcucci](https://applicationspub.unil.ch/interpub/noauth/php/Un/UnPers.php?PerNum=1216876&LanCode=8)"
  links:
  abstract: >
     We study the impact of competition for the control of water resources on local violence across Africa. We use high-resolution data on rivers’ network to measure the distribution of water resources across small geographic areas. Leveraging changes in rainfalls as shocks to the value of water resources in a region, we show that lower water availability in an area located downstream along the river network induces a larger increase of conflicts in areas with higher abundance of water resources. We argue that this difference arises because an increase in the value of water, induced by low rainfall, makes individuals more inclined to seek access to water in neighbouring cells, particularly if these cells are abundant in water and they are located upstream.

- title: "Child Labour, Human Capital and Beliefs"
  pdflink: "/pdf/MS18548manuscript.pdf"
  book: "Public Policy Research Network Best Paper Award, 2023"
  coauthors: "[Kaman Lyu]("https://sites.northwestern.edu/kamanlyu/")"
  abstract: >
    Child labour is pervasive and rising in African countries. Our paper tests a novel hypothesis to explain child labour on family farms. Parents are allocating work instead of school because they view child labour as another dimension of human capital formation. Parents are not under-valuing education. They believe that working on farms is an investment in agricultural skills which can have higher returns than schooling investments if the child will be a farmer in the future. We design and implement a survey for 5,000 households in Ghana to elicit parental beliefs on the returns to child labour. Exploiting vignettes, we find that parents believe that a child who works on family farms alongside school will be 1.6 times more productive as a farmer than if they attained two more years of schooling with no farming experience.
